<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SmartDate Planner</title>
    <link rel="stylesheet" href="style.css">

</head>
<body class="body">

    <h1>デートプランナー</h1>
    <p>AIがあなたに最高のデートを提案します。</p>

    <div id="app-content">
<section id="plan-page" class="page">
</div>
 <div class="app-background">

   <label class="genderlabel"> 👭 あなたの性別は？</label><br>
        <select id="gender">
                 <option value="男性">男性</option>
                 <option value="女性">女性</option>
                 <option value="その他">その他/回答したくない</option>
        </select>       
        <br><br>

        <label class="agelabel">  👦 年齢は？</label><br>
        <input type="number" id="age" placeholder="30">
        <br><br>

        <label class="transportlabel"> 🚗 デートの移動手段は？</label><br>
        <select id="transport">
                 <option value="徒歩・自転車">徒歩・自転車</option>
                 <option value="車">車</option>
                 <option value="電車">電車</option>
        </select>       
        <br><br>
        

        <label class="budgetlabel">💰 デートの予算は？</label>
        <br>
        <input type="number" id="budget" placeholder="10000">
        
        <br><br>
        
        <label class="foodlabel">🍽 食べたいものは？</label>
        <br>
        <select id="food"
             style="padding: 12px; 
                    width: 100%; margin: 10px 0;
                     border: 2px solid #fce7f3;
                     border-radius: 10px; font-size: 16px;
                     background: white;">
            <option>イタリアン</option>
            <option>和食（お寿司など）</option>
            <option>フレンチ</option>
            <option>カジュアルな居酒屋</option>
        </select>
        
        <br><br>    
        
    
        <button type="button" onclick="showResult()" style="background :#db2777;
         color: white; border: none; padding: 15px; border-radius: 15px;
          width: 100%; font-weight: bold;
         font-size: 18px; cursor: pointer; transition: 0.5s;">
            AIにプランを提案してもらう！
        </button>
        </div>
</section>


    <div id="resultArea" style="margin-top: 20px; padding: 20px;
     border-radius: 15px; background: #fff; display: none;
      width: 100%; max-width: 350px;">
    <h3 style="color: #db2777;">💖 AIからの提案プラン</h3>
    <p id="resultText"></p>
</div>

<script>
function showResult() {
    const gender = document.getElementById('gender').value;
    const age = document.getElementById('age').value;
    const budget = document.getElementById('budget').value;
    const food = document.getElementById('food').value;
    const transport= document.getElementById('transport').value;
    let message = `${age}歳の${gender}の方へ、${transport}という移動手段で、
    ${budget}円で楽しめる「${food}」のデートプランを考えています...<br><br>`;
    
    message += "✨ **おすすめプラン** ✨<br>";
    message += "心理学的には、最初にお互いの共通点を見つけると親密度が上がります。";
    message += "まずは落ち着いた雰囲気の店で会話を楽しみましょう！";

    const resultArea = document.getElementById('resultArea');
    const resultText = document.getElementById('resultText');

    resultText.innerHTML = message; 
    resultArea.style.display = 'block'; 
    
    resultArea.scrollIntoView({ behavior: 'smooth' });
}
</script>

</body>
</html>
