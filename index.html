<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>SmartDate Planner</title>
</head>
<body style="padding: 20px; font-family: sans-serif;
             background-color: #fdf2f8; display: flex;
              flex-direction: column; align-items: center;">

    <h1 style="color: #db2777;">デートプランナー</h1>
    <p style="color: #666;">AIがあなたに最高のデートを提案します。</p>

 <div style="background: white; padding: 30px; border-radius: 50px;
     box-shadow: 0 10px 25px rgba(255,0,0,0.5);
     width: 100%; max-width: 350px;
     border: 1px solid #fbcfe8;">

   <label style="font-weight: bold; color: #db2777;"> 👭 あなたの性別は？</label><br>
        <select id="gender"  
               style="padding: 12px;
               width: 100%; margin: 10px 0;
               border: 2px solid #fce7f3;
               border-radius: 10px; font-size: 16px;
                 background: white;">
                 <option value="男性">男性</option>
                 <option value="女性">女性</option>
                 <option value="その他">その他/回答したくない</option>
        </select>       
        <br><br>

        <label style="font-weight: bold; color: #db2777;">  👦 年齢は？</label><br>
        <input type="number" id="age" placeholder="30" 
               style="padding: 12px;
               width: 90%; margin: 10px 0;
               border: 2px solid #fce7f3;
                     border-radius: 10px; font-size: 16px;
                                   background: white;">
        <br><br>

        <label style="font-weight: bold; color: #db2777;">💰 デートの予算は？</label>
        <br>
        <input type="number" id="budget" placeholder="10000" 
               style="padding: 12px; 
                    width: 90%; margin: 10px 0;
                     border: 2px solid #fce7f3;
                     border-radius: 10px; font-size: 16px;
                     background: white;">
        
        <br><br>
        
        <label style="font-weight: bold; color: #db2777;">🍽 食べたいものは？</label>
        <br>
        <select id="food"
             style="padding: 12px; 
                    width: 100%; margin: 10px 0;
                     border: 2px solid #fce7f3;
                     border-radius: 10px; font-size: 16px;
                     background: white;">
            <option>イタリアン</option>
            <option>和食（お寿司など）</option>
            <option>フレンチ</option>
            <option>カジュアルな居酒屋</option>
        </select>
        
        <br><br>
        
        
        <button type="button" onclick="showResult()" style="background :#db2777 ;
         color: white; border: none; padding: 15px; border-radius: 15px;
          width: 100%; font-weight: bold;
         font-size: 18px; cursor: pointer; transition: 0.5s;">
            AIにプランを提案してもらう！
        </button>
        </div>

        <div id="resultArea" style="margin-top: 20px; padding: 20px; border-radius: 15px; background: #fff; display: none; width: 100%; max-width: 350px;">
    <h3 style="color: #db2777;">💖 AIからの提案プラン</h3>
    <p id="resultText"></p>
</div>
<script>
function showResult() {
    const gender = document.getElementById('gender').value;
    const age = document.getElementById('age').value;
    const budget = document.getElementById('budget').value;
    const food = document.getElementById('food').value;

    let message = `${age}歳の${gender}の方へ、予算${budget}円で楽しめる「${food}」のデートプランを考えています...<br><br>`;
    
    message += "✨ **おすすめプラン** ✨<br>";
    message += "心理学的には、最初にお互いの共通点を見つけると親密度が上がります。";
    message += "まずは落ち着いた雰囲気の店で会話を楽しみましょう！";

    const resultArea = document.getElementById('resultArea');
    const resultText = document.getElementById('resultText');

    resultText.innerHTML = message; 
    resultArea.style.display = 'block'; 
    
    resultArea.scrollIntoView({ behavior: 'smooth' });
}
</script>







</body>
</html>
